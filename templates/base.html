<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex h-screen font-sans text-gray-800">
    
    <aside class="w-64 bg-slate-800 text-white flex flex-col shadow-lg">
        <div class="p-6 text-2xl font-bold border-b border-slate-700 tracking-wide">
            Resto ERP
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <a href="/dashboard" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-700 hover:text-white">Dashboard</a>
            <a href="/menu" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-700 hover:text-white">Menu Items</a>
            <a href="/orders" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-700 hover:text-white">Order History</a>
            {% if session.get('role') == 'admin' %}
            <a href="/manage_user" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-700 hover:text-white">Manage accounts</a>
            {% endif %}
        </nav>
        {% if session.get('role') == 'admin' %}
        <div class="p-4 border-t border-slate-700 space-y-2">
            <span class="block px-4 text-sm text-slate-400 mb-2">Logged in as Admin</span>
            <a href="/" class="block py-2 px-4 rounded transition duration-200 hover:bg-red-600 hover:text-white text-sm">Logout</a>
        </div>
        {% else %}
        <div class="p-4 border-t border-slate-700 space-y-2">
            <span class="block px-4 text-sm text-slate-400 mb-2">Logged in as Staff</span>
            <a href="/logout" class="block py-2 px-4 rounded transition duration-200 hover:bg-red-600 hover:text-white text-sm">Logout</a>
        </div>
        {% endif %}
    </aside>

    <main class="flex-1 overflow-y-auto p-10">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
