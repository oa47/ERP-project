{% extends "base.html" %}

{% block title %}User Management - Resto ERP{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-800">User Management</h1>
    <p class="text-gray-500 mt-1">Create new accounts and manage system access.</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <div class="lg:col-span-1">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold text-slate-800 mb-4">Add New User</h2>
            
            <form action="/manage_users" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                    <input type="email" name="email" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none transition" required>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Temporary Password</label>
                    <input type="password" name="password" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none transition" required>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">System Role</label>
                    <select name="role" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none bg-white">
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <button type="submit" class="w-full bg-slate-800 text-white font-bold py-3 mt-2 rounded-lg hover:bg-slate-900 transition duration-200 shadow-md">
                    Create Account
                </button>
            </form>
        </div>
    </div>

    <div class="lg:col-span-2">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-200 bg-slate-50">
                <h2 class="text-xl font-bold text-slate-800">Active System Users</h2>
            </div>
            
            <table class="w-full text-left border-collapse">
                <thead class="bg-white border-b border-gray-200 text-slate-600">
                    <tr>
                        <th class="p-4 font-semibold text-sm">ID</th>
                        <th class="p-4 font-semibold text-sm">Email</th>
                        <th class="p-4 font-semibold text-sm">Role</th>
                        <th class="p-4 font-semibold text-sm">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 text-gray-700">
                    
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 text-sm text-gray-500">1</td>
                        <td class="p-4 font-bold text-slate-800">admin@resto.com</td>
                        <td class="p-4">
                            <span class="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">Admin</span>
                        </td>
                        <td class="p-4">
                            <button class="text-red-500 hover:text-red-700 font-semibold text-sm">Revoke Access</button>
                        </td>
                    </tr>

                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 text-sm text-gray-500">2</td>
                        <td class="p-4 font-bold text-slate-800">staff1@resto.com</td>
                        <td class="p-4">
                            <span class="bg-gray-100 text-gray-800 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">Staff</span>
                        </td>
                        <td class="p-4">
                            <button class="text-red-500 hover:text-red-700 font-semibold text-sm">Revoke Access</button>
                        </td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </div>
    
</div>
{% endblock %}
