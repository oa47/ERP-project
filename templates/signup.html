<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Resto ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen font-sans">
    <div class="bg-white p-10 rounded-xl shadow-lg w-96 border border-gray-200">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-slate-800">Create Account</h2>
            <p class="text-gray-500 text-sm mt-2">Register a new system user</p>
        </div>
        
        <form action="/signup" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" name="email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" name="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">System Role</label>
                <select name="role" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    <option value="staff">Staff</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-slate-800 text-white font-bold py-3 mt-2 rounded-lg hover:bg-slate-900 transition duration-200 shadow-md">
                Register User
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-600">
            Already have an account? <a href="/" class="text-blue-600 font-semibold hover:underline">Log in</a>
        </p>
    </div>
</body>
</html>
